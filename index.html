<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0f0a1a;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Kamera di atas */
#reader {
  flex: 1;
  width: 100%;
  background: black;
}

/* Area bawah */
#bottomBar {
  padding: 20px;
  text-align: center;
  background: #1e1b2e;
  box-shadow: 0 -5px 20px rgba(168,85,247,0.3);
}

/* Tombol scan */
#scanBtn {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: white;
  box-shadow: 0 0 20px rgba(168,85,247,0.6);
}

/* Popup */
#popup {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #1e1b2e;
  padding: 20px;
  border-radius: 25px 25px 0 0;
  display: none;
  text-align: center;
  box-shadow: 0 -5px 25px rgba(168,85,247,0.4);
}

#popup p {
  color: #ddd;
  word-break: break-all;
}

/* Tombol popup */
button {
  margin: 6px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}

.copy { background: #7c3aed; }
.open { background: #9333ea; }
.close { background: #c026d3; }

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div id="reader"></div>

<div id="bottomBar">
  <button id="scanBtn">SCAN</button>
</div>

<div id="popup">
  <p id="resultText"></p>
  <button class="copy" onclick="copyText()">Copy</button>
  <button class="open" onclick="openLink()">Open</button>
  <button class="close" onclick="closePopup()">Tutup</button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scanner;
let scannedText = "";
let isScanning = false;

document.getElementById("scanBtn").onclick = function () {
  if (isScanning) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      scannedText = decodedText;

      scanner.stop().then(() => {
        isScanning = false;

        document.getElementById("popup").style.display = "block";
        document.getElementById("resultText").innerText = decodedText;
      });
    }
  );

  isScanning = true;
};

function copyText() {
  navigator.clipboard.writeText(scannedText);
  alert("Tersalin!");
}

function openLink() {
  window.open(scannedText, "_blank");
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
