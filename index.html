<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hercu ID - QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  background: #000;
  color: white;
  text-align: center;
  font-family: Arial;
}

h2 {
  margin-top: 20px;
  color: #00ffcc;
}

#reader {
  width: 320px;
  margin: 20px auto;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 15px #00ffcc;
}

#resultBox {
  display: none;
  margin-top: 15px;
}

button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
}
</style>
</head>

<body>

<h2>🔐 Hercu ID Scanner</h2>
<div id="reader"></div>

<div id="resultBox">
  <p id="linkText"></p>
  <button onclick="copyLink()">📋 Copy</button>
  <button onclick="openLink()">🌐 Open</button>
</div>

<script>
// hanya HP
if (!/Android|iPhone/i.test(navigator.userAgent)) {
  document.body.innerHTML = "<h2>❌ Buka di HP!</h2>";
}

let scannedLink = "";

function onScan(text) {
  if (text.startsWith("http")) {
    scannedLink = text;
    document.getElementById("linkText").innerText = text;
    document.getElementById("resultBox").style.display = "block";
  }
}

// copy
function copyLink() {
  navigator.clipboard.writeText(scannedLink);
  alert("Link disalin!");
}

// open
function openLink() {
  window.location.href = scannedLink;
}

// start kamera belakang
const qr = new Html5Qrcode("reader");
qr.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScan
);
</script>

</body>
</html>
