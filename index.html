<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hercu ID</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h2 {
  color: #00ffcc;
  margin-bottom: 10px;
}

#reader {
  width: 90%;
  max-width: 400px;
  aspect-ratio: 1/1;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px #00ffcc;
}

#resultBox {
  display: none;
  margin-top: 15px;
  text-align: center;
  width: 90%;
  word-break: break-all;
}

button {
  margin: 5px;
  padding: 12px;
  width: 120px;
  border: none;
  border-radius: 12px;
  background: #00ffcc;
  color: black;
  font-weight: bold;
}

/* kalau layar besar (desktop) */
@media (min-width: 768px) {
  body {
    background: #111;
  }
}
</style>
</head>

<body>

<h2>🔐 Hercu ID</h2>
<div id="reader"></div>

<div id="resultBox">
  <p id="linkText"></p>
  <button onclick="copyLink()">📋 Copy</button>
  <button onclick="openLink()">🌐 Open</button>
</div>

<script>
// hanya HP
if (!/Android|iPhone/i.test(navigator.userAgent)) {
  document.body.innerHTML = "<h2>❌ Buka di HP ya!</h2>";
}

let scannedLink = "";

function onScan(text) {
  if (text.startsWith("http")) {
    scannedLink = text;
    document.getElementById("linkText").innerText = text;
    document.getElementById("resultBox").style.display = "block";
  }
}

function copyLink() {
  navigator.clipboard.writeText(scannedLink);
  alert("Link disalin!");
}

function openLink() {
  window.location.href = scannedLink;
}

const qr = new Html5Qrcode("reader");
qr.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: { width: 250, height: 250 } },
  onScan
);
</script>

</body>
</html>
